[General]
; Main configuration keys for the mod
; Valid values: Numpad0-9, NumpadPlus, or DIK code (0x4C)
MagicMode = Numpad0
ResolveSpell = NumpadPlus

[Schools of Magic]
; Configure key bindings for each school of magic
Alteration = Numpad6
Conjuration = Numpad5
Destruction = Numpad8
Illusion = Numpad4
Restoration = Numpad2

[Delivery]
; Configure key bindings for spell delivery methods
Projectile = Numpad8
Self = Numpad2
AoE = Numpad7
Summon = Numpad5
Reanimate = Numpad9
BoundWeapon = Numpad1

[Level]
; Configure key bindings for spell levels
Novice = Numpad4
Apprentice = Numpad7
Adept = Numpad8
Expert = Numpad9
Master = Numpad6

[Element]
; Configure key bindings for spell elements
Fire = Numpad8
Frost = Numpad7
Shock = Numpad9
Hostile = Numpad4
Friendly = Numpad2
